schedule:
  time: "20:00"            # local time, HH:MM 24h
ranking:
  topN: 500           # rank-and-keep all ingested postings; dashboard sorts best→worst
search:
  filters:
    - keywords: "Software Development Engineer"
      location: "India"
      experienceLevel: "mid-senior"
      datePosted: "past-24h"
apply:
  dailyCap: 8
  easyApplyOnly: false   # fetch BOTH easy-apply and external (company-ATS) jobs
llm:
  model: "us.anthropic.claude-sonnet-4-6"   # AWS Bedrock cross-region inference profile
telegram:
  chatId: 0                # filled in by the user; token comes from env
